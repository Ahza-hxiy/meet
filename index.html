
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grup Kicaw Ultimate</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --pink: #ff85a1;
            --pink-dark: #f06292;
            --glass: rgba(255,255,255,0.35);
            --glass-border: rgba(255,255,255,0.5);
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body{
            font-family:'Poppins',sans-serif;
            background: linear-gradient(135deg,#fbc2eb 0%,#a6c1ee 100%);
            height:100dvh;
            overflow:hidden;
            display:flex;
            justify-content:center;
            align-items:flex-start;
            padding:10px;
        }

        .main-wrapper{
            width:100%;
            max-width:450px;
            height:100%;
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .group-header{
            background:var(--glass);
            backdrop-filter:blur(15px);
            border-radius:50px;
            border:1px solid var(--glass-border);
            padding:10px;
            text-align:center;
            color:white;
            flex-shrink:0;
        }

        .chat-container{
            flex:1;
            display:flex;
            flex-direction:column;
            overflow:hidden;
            border-radius:25px;
            background:var(--glass);
            backdrop-filter:blur(20px);
            border:1px solid var(--glass-border);
            position:relative;
        }

        header{
            padding:12px;
            display:flex;
            align-items:center;
            gap:10px;
            background:rgba(255,255,255,0.2);
            border-bottom:1px solid var(--glass-border);
            cursor:pointer;
        }

        .avatar{
            width:40px;
            height:40px;
            border-radius:50%;
            object-fit:cover;
            border:2px solid white;
        }

        .user-name{
            font-size:0.9rem;
            font-weight:600;
            color:#444;
        }

        #chat-window{
            flex:1;
            overflow-y:auto;
            padding:15px;
            display:flex;
            flex-direction:column;
            gap:15px;
            position:relative;
        }

        .msg-row{
            display:flex;
            align-items:flex-end;
            gap:8px;
        }

        .msg-row.me{
            flex-direction:row-reverse;
        }

        .msg-avatar{
            width:28px;
            height:28px;
            border-radius:50%;
            object-fit:cover;
            border:1px solid white;
            flex-shrink:0;
        }

        .msg{
            max-width:75%;
            padding:10px 14px;
            border-radius:18px;
            word-wrap:break-word;
            font-size:0.85rem;
            box-shadow:0 2px 5px rgba(0,0,0,0.05);
        }

        .msg.me{
            background:var(--pink);
            color:white;
            border-bottom-right-radius:2px;
        }

        .msg.other{
            background:white;
            color:#444;
            border-bottom-left-radius:2px;
        }

        .msg img{
            width:100%;
            border-radius:12px;
            display:block;
            margin-top:5px;
        }

        .sticker-msg{
            background:none !important;
            padding:0 !important;
            box-shadow:none !important;
        }

        .sticker-msg img{
            width:130px;
            height:130px;
            border-radius:0;
        }

        .time{
            display:block;
            margin-top:4px;
            font-size:0.6rem;
            opacity:0.7;
            text-align:right;
        }

        .bottom-section{
            flex-shrink:0;
        }

        .reaction-bar{
            display:flex;
            justify-content:center;
            gap:12px;
            padding:6px;
        }

        .re-btn{
            background:none;
            border:none;
            font-size:1.2rem;
            cursor:pointer;
        }

        .input-area{
            display:flex;
            gap:8px;
            padding:10px;
            align-items:center;
            background:rgba(255,255,255,0.2);
        }

        #msg-input{
            flex:1;
            border:none;
            outline:none;
            border-radius:20px;
            padding:12px 15px;
            font-size:16px;
            background:white;
        }

        .icon-btn{
            width:42px;
            height:42px;
            border-radius:50%;
            border:none;
            cursor:pointer;
            background:white;
            font-size:1rem;
        }

        .screen{
            position:absolute;
            inset:0;
            background:rgba(0,0,0,0.7);
            backdrop-filter:blur(10px);
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:9999;
            padding:20px;
        }

        .modal{
            width:100%;
            max-width:350px;
            background:white;
            border-radius:20px;
            padding:20px;
            overflow-y:auto;
            max-height:90vh;
        }

        .hidden{
            display:none !important;
        }

        input{
            width:100%;
            padding:12px;
            border-radius:12px;
            border:1px solid #ddd;
            margin:8px 0;
            outline:none;
            font-size:16px;
        }

        .primary-btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:12px;
            background:var(--pink);
            color:white;
            font-weight:600;
            cursor:pointer;
        }

        #reaction-zone{
            position:absolute;
            inset:0;
            pointer-events:none;
            overflow:hidden;
        }

        .floating-emoji{
            position:absolute;
            bottom:0;
            font-size:2rem;
            animation:flyUpChat 2s ease-out forwards;
        }

        @keyframes flyUpChat{
            0%{
                transform:translateY(0) scale(0.5);
                opacity:0;
            }

            20%{
                opacity:1;
            }

            100%{
                transform:translateY(-400px) translateX(var(--randX)) scale(1.2);
                opacity:0;
            }
        }
    </style>
</head>
<body>

<div class="main-wrapper">

    <div class="group-header">
        <h2>GRUP KICAW ✨</h2>
    </div>

    <div class="chat-container">

        <header onclick="openSettings()">
            <img id="my-avatar" class="avatar" src="img/foto1.jpg">

            <div>
                <p id="my-name" class="user-name">Memuat...</p>
                <p style="font-size:0.65rem;color:var(--pink-dark);font-weight:600;">
                    Klik Profil & Pengaturan
                </p>
            </div>
        </header>

        <div id="chat-window">
            <div id="reaction-zone"></div>
        </div>

        <div id="sticker-panel" style="display:none;grid-template-columns:repeat(3,1fr);gap:10px;padding:15px;background:white;position:absolute;bottom:110px;left:15px;right:15px;border-radius:20px;z-index:100;box-shadow:0 -5px 20px rgba(0,0,0,0.1);"></div>

        <div class="bottom-section">

            <div class="reaction-bar">
                <button class="re-btn" onclick="sendReaction('❤️')">❤️</button>
                <button class="re-btn" onclick="sendReaction('😂')">😂</button>
                <button class="re-btn" onclick="sendReaction('🔥')">🔥</button>
                <button class="re-btn" onclick="sendReaction('👍')">👍</button>
            </div>

            <div class="input-area">
                <button class="icon-btn" onclick="toggleStickers()">😊</button>
                <button class="icon-btn" onclick="document.getElementById('file-input').click()">📎</button>

                <input type="file" id="file-input" hidden accept="image/*">

                <input type="text" id="msg-input" placeholder="Ketik pesan...">

                <button id="send-btn" class="icon-btn" style="background:var(--pink);color:white;">
                    ➤
                </button>
            </div>
        </div>
    </div>
</div>

<!-- LOGIN -->
<div id="login-screen" class="screen">
    <div class="modal">
        <h3>Masuk Kicaw</h3>

        <input type="tel" id="phone" placeholder="Nomor HP">
        <input type="text" id="reg-name" placeholder="Nama Panggilan">
        <input type="password" id="pass" placeholder="Password">

        <button onclick="handleLogin()" class="primary-btn">
            Mulai
        </button>
    </div>
</div>

<!-- SETTINGS -->
<div id="settings-screen" class="screen hidden">
    <div class="modal">

        <h3>Profil Saya</h3>

        <div id="avatar-list" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:15px 0;"></div>

        <input type="text" id="edit-name" placeholder="Nama Baru">
        <input type="password" id="edit-pass" placeholder="Password Baru">

        <button onclick="saveProfile()" class="primary-btn">
            Simpan
        </button>

        <button onclick="handleLogout()" style="width:100%;padding:12px;margin-top:10px;border-radius:12px;border:1px solid red;background:white;color:red;cursor:pointer;">
            Logout
        </button>

        <div style="margin-top:20px;padding-top:15px;border-top:1px dashed #ddd;">
            <p style="font-size:0.8rem;font-weight:600;color:#999;margin-bottom:10px;">
                KONTAK PENGEMBANG
            </p>

            <a href="https://app.u.shopeepay.co.id/u/qsX9eS6EgzsSmx2aUwNda"
               target="_blank"
               style="display:block;text-decoration:none;color:#444;margin-bottom:8px;font-size:0.85rem;">
               ☕ Buy Me Coffee (ShopeePay)
            </a>

            <a href="https://wa.me/6285692107849"
               target="_blank"
               style="display:block;text-decoration:none;color:#444;margin-bottom:8px;font-size:0.85rem;">
               💬 WhatsApp: 085692107849
            </a>

            <a href="https://www.instagram.com/ahzaaaa.hxiy?igsh=MW5zNGVscTJramVpcw=="
               target="_blank"
               style="display:block;text-decoration:none;color:#444;font-size:0.85rem;">
               📸 Instagram: @ahzaaaa.hxiy
            </a>
        </div>

        <p onclick="closeSettings()" style="text-align:center;margin-top:15px;color:#999;cursor:pointer;">
            [ TUTUP ]
        </p>
    </div>
</div>

<!-- PREVIEW -->
<div id="preview-screen" class="screen hidden">
    <div class="modal">

        <h3>Kirim Gambar?</h3>

        <img id="image-to-preview" style="width:100%;max-height:250px;object-fit:contain;border-radius:15px;margin:15px 0;">

        <div style="display:flex;gap:10px;">
            <button onclick="closePreview()" class="primary-btn" style="background:#888;">
                Batal
            </button>

            <button id="confirm-send-btn" class="primary-btn">
                Kirim
            </button>
        </div>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
    getDatabase,
    ref,
    push,
    onChildAdded,
    onChildRemoved,
    get,
    set,
    update,
    remove,
    serverTimestamp,
    query,
    limitToLast
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyAMaHdoCynL939eZ0cwlfuF0KXgOp-ES1A",
    authDomain: "familychat-3fbdf.firebaseapp.com",
    databaseURL: "https://familychat-3fbdf-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "familychat-3fbdf",
    storageBucket: "familychat-3fbdf.firebasestorage.app",
    messagingSenderId: "500764657014",
    appId: "1:500764657014:web:18ccba50cfc06db124a657"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ================================
// APPWRITE CONFIG
// ================================

const APPWRITE_ENDPOINT = "https://sgp.cloud.appwrite.io/v1";
const APPWRITE_PROJECT_ID = "6a06950400028fbc7ad3";
const APPWRITE_DATABASE_ID = "6a0695bb00090ad1e2eb";
const APPWRITE_COLLECTION_ID = "messages";
const APPWRITE_BUCKET_ID = "6a069722002e995c025a";

console.log("APPWRITE READY:", {
    APPWRITE_ENDPOINT,
    APPWRITE_PROJECT_ID,
    APPWRITE_DATABASE_ID,
    APPWRITE_COLLECTION_ID,
    APPWRITE_BUCKET_ID
});

let currentUser = localStorage.getItem('chat_phone') || "";
let currentPass = localStorage.getItem('chat_pass') || "";
let selectedAvatar = "img/foto1.jpg";
let tempFileData = null;
let reactionCooldown = false;

function escapeHtml(text){
    const div = document.createElement('div');
    div.innerText = text;
    return div.innerHTML;
}

window.scrollToBottom = () => {
    setTimeout(() => {
        const win = document.getElementById('chat-window');
        win.scrollTop = win.scrollHeight;
    },300);
};

function fixDriveUrl(url){
    if(!url) return "";

    const match = url.match(/[-\w]{25,}/);

    if(match){
        return `https://drive.google.com/thumbnail?id=${match[0]}&sz=w1000`;
    }

    return url;
}

window.addEventListener('load', () => {
    if(currentUser && currentPass){
        handleLogin(currentUser, currentPass);
    }
});

window.handleLogin = async (p,s) => {

    const phone = p || document.getElementById('phone').value.trim();
    const pass = s || document.getElementById('pass').value.trim();

    if(!phone || !pass){
        alert("Isi nomor HP dan password!");
        return;
    }

    try{

        const snap = await get(ref(db, 'users/' + phone));

        if(snap.exists() && snap.val().password === pass){
            loginSuccess(phone, pass, snap.val());
        }

        else if(!snap.exists()){

            const newUser = {
                password: pass,
                name: document.getElementById('reg-name').value || "Anggota Kicaw",
                avatar: "img/foto1.jpg"
            };

            await set(ref(db, 'users/' + phone), newUser);
            loginSuccess(phone, pass, newUser);
        }

        else{
            alert("Password salah!");
        }

    }catch(err){
        console.log(err);
        alert("Gagal koneksi!");
    }
};

function loginSuccess(phone, pass, data){

    currentUser = phone;

    localStorage.setItem('chat_phone', phone);
    localStorage.setItem('chat_pass', pass);

    document.getElementById('login-screen').classList.add('hidden');

    document.getElementById('my-name').innerText = data.name || phone;

    document.getElementById('my-avatar').src = data.avatar || 'img/foto1.jpg';

    selectedAvatar = data.avatar || 'img/foto1.jpg';

    initChat();
    initReactions();
    setupStickers();
}

function setupStickers(){

    const panel = document.getElementById('sticker-panel');
    panel.innerHTML = "";

    for(let i=1;i<=6;i++){

        const img = document.createElement('img');

        img.src = `stiker${i}.jpg`;

        img.style = "width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:pointer;";

        img.onclick = () => {

            push(ref(db, 'messages'), {
                sender: currentUser,
                text: i,
                isSticker: true,
                timestamp: serverTimestamp()
            });

            toggleStickers();
        };

        panel.appendChild(img);
    }
}

window.toggleStickers = () => {

    const panel = document.getElementById('sticker-panel');

    panel.style.display = panel.style.display === 'grid'
        ? 'none'
        : 'grid';
};

// ENTER SEND

document.getElementById('msg-input')
.addEventListener('keypress', (e) => {

    if(e.key === 'Enter'){
        document.getElementById('send-btn').click();
    }
});

// SEND TEXT

document.getElementById('send-btn').onclick = () => {

    const txt = document.getElementById('msg-input').value.trim();

    if(!txt) return;

    push(ref(db, 'messages'), {
        sender: currentUser,
        text: txt,
        isSticker:false,
        isImage:false,
        timestamp: serverTimestamp()
    });

    document.getElementById('msg-input').value = "";

    scrollToBottom();
};

// IMAGE PREVIEW

document.getElementById('file-input').onchange = (e) => {

    const file = e.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.readAsDataURL(file);

    reader.onload = () => {

        tempFileData = {
            base64: reader.result.split(',')[1],
            type: file.type,
            name: file.name
        };

        document.getElementById('image-to-preview').src = reader.result;

        document.getElementById('preview-screen').classList.remove('hidden');
    };
};

window.closePreview = () => {
    document.getElementById('preview-screen').classList.add('hidden');
    tempFileData = null;
};

// DUMMY IMAGE SEND

document.getElementById('confirm-send-btn').onclick = async () => {

    if(!tempFileData) return;

    push(ref(db, 'messages'), {
        sender: currentUser,
        text: document.getElementById('image-to-preview').src,
        isImage:true,
        timestamp: serverTimestamp()
    });

    closePreview();
};

// CHAT

function initChat(){

    const win = document.getElementById('chat-window');

    const messagesQuery = query(
        ref(db, 'messages'),
        limitToLast(100)
    );

    onChildAdded(messagesQuery, async (snap) => {

        const d = snap.val();

        const isMe = d.sender === currentUser;

        let senderData = null;

        try{
            const userSnap = await get(ref(db, 'users/' + d.sender));
            senderData = userSnap.exists() ? userSnap.val() : null;
        }catch(e){
            console.log(e);
        }

        const senderName = senderData?.name || d.sender || 'Anggota';
        const senderAvatar = senderData?.avatar || 'img/foto1.jpg';

        const row = document.createElement('div');

        row.className = `msg-row ${isMe ? 'me' : 'other'}`;

        row.id = 'msg-' + snap.key;

        let bodyHtml = "";

        const textContent = d.text || "";

        if(d.isSticker){
            bodyHtml = `<img src="stiker${textContent}.jpg">`;
        }

        else if(d.isImage){
            bodyHtml = `<img src="${textContent}">`;
        }

        else{
            bodyHtml = escapeHtml(textContent);
        }

        let dt = d.timestamp
            ? new Date(d.timestamp)
            : new Date();

        const time = dt.getHours().toString().padStart(2,'0')
            + ':' +
            dt.getMinutes().toString().padStart(2,'0');

        row.innerHTML = `
            <img src="${senderAvatar}" class="msg-avatar">

            <div class="msg ${isMe ? 'me' : 'other'} ${d.isSticker ? 'sticker-msg' : ''}">

                <small style="font-size:0.6rem;display:block;opacity:0.8;font-weight:600;">
                    ${isMe ? 'Anda' : senderName}
                </small>

                ${bodyHtml}

                <span class="time">${time}</span>
            </div>
        `;

        row.querySelector('.msg').onclick = () => {

            if(isMe && confirm('Hapus pesan ini?')){
                remove(ref(db, 'messages/' + snap.key));
            }
        };

        win.appendChild(row);

        scrollToBottom();
    });

    onChildRemoved(ref(db, 'messages'), (snap) => {
        document.getElementById('msg-' + snap.key)?.remove();
    });
}

// REACTION

window.sendReaction = (emoji) => {

    if(reactionCooldown) return;

    reactionCooldown = true;

    push(ref(db, 'reactions'), {
        emoji,
        time: Date.now()
    });

    setTimeout(() => {
        reactionCooldown = false;
    },1000);
};

function initReactions(){

    onChildAdded(ref(db, 'reactions'), (snap) => {

        const d = snap.val();

        if(Date.now() - d.time > 5000) return;

        const el = document.createElement('div');

        el.className = 'floating-emoji';
        el.innerText = d.emoji;

        el.style.left = Math.random() * 80 + 10 + '%';

        el.style.setProperty(
            '--randX',
            (Math.random() * 200 - 100) + 'px'
        );

        document.getElementById('reaction-zone').appendChild(el);

        setTimeout(() => {
            el.remove();
        },2000);
    });
}

// SETTINGS

window.openSettings = () => {

    document.getElementById('settings-screen')
    .classList.remove('hidden');

    const list = document.getElementById('avatar-list');

    list.innerHTML = "";

    for(let i=1;i<=6;i++){

        const url = `img/foto${i}.jpg`;

        const img = document.createElement('img');

        img.src = url;

        img.style = `
            width:100%;
            aspect-ratio:1;
            border-radius:50%;
            object-fit:cover;
            cursor:pointer;
            border:3px solid ${selectedAvatar === url ? 'var(--pink)' : 'transparent'};
        `;

        img.onclick = () => {
            selectedAvatar = url;
            openSettings();
        };

        list.appendChild(img);
    }
};

window.closeSettings = () => {
    document.getElementById('settings-screen').classList.add('hidden');
};

window.saveProfile = async () => {

    let up = {
        avatar: selectedAvatar,
        name: document.getElementById('edit-name').value || document.getElementById('my-name').innerText
    };

    if(document.getElementById('edit-pass').value){
        up.password = document.getElementById('edit-pass').value;
    }

    await update(ref(db, 'users/' + currentUser), up);

    location.reload();
};

window.handleLogout = () => {
    localStorage.clear();
    location.reload();
};

</script>
</body>
</html>
